<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#064c39" />
    <meta
      name="description"
      content="SmartSetupUAE helps founders compare UAE free zone, mainland, visa and business setup options with AI-powered guidance and Supabase-backed checkout."
    />
    <meta name="application-name" content="SmartSetupUAE" />
    <meta property="og:site_name" content="SmartSetupUAE" />
    <meta property="og:title" content="SmartSetupUAE | AI Business Setup UAE" />
    <meta
      property="og:description"
      content="AI-powered UAE business setup guidance, free zone comparison, founder portal and company compliance support."
    />
    <meta name="twitter:title" content="SmartSetupUAE | AI Business Setup UAE" />
    <meta
      name="twitter:description"
      content="AI-powered UAE business setup guidance, free zone comparison, founder portal and company compliance support."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />
    <title>SmartSetupUAE | AI Business Setup UAE</title>
    <!-- Google Translate Element (hidden, used by our custom language selector) -->
    <style>
      .goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .goog-tooltip,
      .goog-tooltip:hover, .goog-text-highlight, .skiptranslate { display: none !important; visibility: hidden !important; }
      body { top: 0 !important; }
      #google_translate_element { position: absolute; left: -9999px; top: -9999px; }
      html[lang] font, body font { background: transparent !important; box-shadow: none !important; }
    </style>
    <div id="google_translate_element"></div>
    <script>
      window.googleTranslateElementInit = function () {
        try {
          new window.google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'ar,bn,de,en,es,fa,fil,fr,hi,id,it,ja,ko,ml,mr,ms,nl,pa,pl,pt,ru,sw,ta,te,th,tr,uk,ur,vi,zh-CN',
            autoDisplay: false,
          }, 'google_translate_element');
        } catch (e) { /* widget unavailable */ }
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <script>
      window.addEventListener(
        "error",
        function (event) {
          if (
            event.error instanceof DOMException &&
            event.error.name === "DataCloneError" &&
            event.message &&
            event.message.includes("PerformanceServerTiming")
          ) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        },
        true
      );
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
