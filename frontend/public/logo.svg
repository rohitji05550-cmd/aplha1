<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none" role="img" aria-label="SmartSetupUAE">
  <defs>
    <linearGradient id="ssBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="60%" stop-color="#0F433f"/>
      <stop offset="100%" stop-color="#0A2624"/>
    </linearGradient>
    <linearGradient id="ssGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD980"/>
      <stop offset="50%" stop-color="#F0B440"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="ssSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A8780" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FCD980" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Emblem: emerald square w/ Dubai skyline silhouette in gold -->
  <rect x="2" y="6" width="50" height="48" rx="10" fill="url(#ssBg)"/>
  <!-- Subtle horizon glow -->
  <rect x="2" y="32" width="50" height="22" rx="10" fill="url(#ssSky)"/>

  <!-- Sun / star above skyline -->
  <circle cx="38" cy="16" r="2.6" fill="url(#ssGold)"/>

  <!-- Dubai skyline (gold silhouettes): Burj Al Arab sail · Burj Khalifa spire · Emirates Towers · Frame -->
  <g fill="url(#ssGold)">
    <!-- Left building (Emirates Tower-like) -->
    <path d="M7 44 L7 31 L9 28 L11 31 L11 44 Z"/>
    <!-- Burj Al Arab (sail curve) -->
    <path d="M14 44 L14 28 C15 25 17 23 18 22 C19 23 20 26 20 30 L20 44 Z"/>
    <!-- Mid mid-height block -->
    <rect x="22" y="33" width="3" height="11"/>
    <!-- Burj Khalifa tapered spire -->
    <path d="M27 44 L27 19 L28 17 L28.5 13 L29 17 L30 19 L30 44 Z"/>
    <!-- Right tower -->
    <path d="M32 44 L32 26 L33.5 23 L35 26 L35 44 Z"/>
    <!-- Dubai Frame -->
    <rect x="37" y="29" width="9" height="15" stroke="url(#ssGold)" stroke-width="0.8" fill="none"/>
    <rect x="37" y="29" width="9" height="2"/>
    <rect x="37" y="42" width="9" height="2"/>
  </g>

  <!-- Ground line -->
  <rect x="5" y="46.5" width="44" height="1" fill="url(#ssGold)" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="60" y="32" font-family="'Fraunces','Playfair Display','Georgia',serif"
        font-size="22" font-weight="700" fill="#0F2A2A" letter-spacing="-0.5">SmartSetup</text>
  <text x="60" y="50" font-family="'Inter','system-ui',sans-serif"
        font-size="11.5" font-weight="800" fill="#0F766E" letter-spacing="2.8">UAE · AI CONCIERGE</text>
</svg>
